name: GDScript Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  gdscript-lint:
    name: GDScript Linter
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdtoolkit
        run: pip install "gdtoolkit>=4.2.2"

      - name: Run gdlint
        run: |
          # El comando busca todos los archivos .gd en el proyecto.
          # Si no tienes una carpeta "scripts/", esto evitará que el workflow falle por "directorio no encontrado".
          gdlint .
