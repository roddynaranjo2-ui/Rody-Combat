name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  GODOT_RELEASE: "stable"
  EXPORT_PRESET: "Android"
  APK_NAME: "combate_movil_v1_beta.apk"

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: false

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}
          use-dotnet: false
          include-templates: true

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Falta el secreto RELEASE_KEYSTORE_BASE64"
            exit 1
          fi
          mkdir -p /home/runner/keystores
          echo "$KEYSTORE_BASE64" | tr -d '\r\n ' | base64 --decode > /home/runner/keystores/release.keystore

      - name: Bump Android versionCode
        run: |
          if [ -f export_presets.cfg ]; then
            sed -i "s/^version\/code=.*/version\/code=${{ github.run_number }}/" export_presets.cfg
          fi

      - name: Godot pre-import
        run: |
          godot --headless --import

      - name: Export Android APK (release)
        run: |
          mkdir -p builds
          godot --headless --export-release "${{ env.EXPORT_PRESET }}" builds/${{ env.APK_NAME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: combate-movil-apk
          path: builds/${{ env.APK_NAME }}
          retention-days: 30
